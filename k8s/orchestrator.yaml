apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: ai-devops-copilot_orchestrator:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: orchestrator-config
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-config
data:
  OBSERVABILITY_URL: "http://observability:3000"
  AI_ENGINE_URL: "http://ai-engine:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
spec:
  selector:
    app: orchestrator
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP