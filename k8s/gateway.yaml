apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ai-devops-copilot_gateway:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: gateway-config
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
data:
  ORCHESTRATOR_URL: "http://orchestrator:3000"
  OBSERVABILITY_URL: "http://observability:3000"
  AI_ENGINE_URL: "http://ai-engine:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: gateway
  ports:
    - port: 3000
      targetPort: 3000
  type: NodePort